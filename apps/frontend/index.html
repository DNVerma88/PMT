<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#1565C0" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0A1929" media="(prefers-color-scheme: dark)" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="PMT" />
    <meta name="description" content="PMT – Project Management Tool for Roadmap, Release Cadence, Productivity and Headcount Reporting" />
    <!--
      Content-Security-Policy must be delivered as an HTTP header by the production
      web server (nginx / CDN) serving the built assets — NOT via meta tag.
      A meta-tag CSP blocks Vite's HMR inline scripts in development and cannot
      express frame-ancestors. Configure your web server with:

        Content-Security-Policy:
          default-src 'self';
          script-src 'self';
          style-src 'self' 'unsafe-inline';
          img-src 'self' data: blob:;
          font-src 'self' data:;
          connect-src 'self';
          frame-ancestors 'none';
          object-src 'none';
          base-uri 'self';
          form-action 'self';
    -->
    <title>PMT | Project Management Tool</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/icons/icon-192.svg" />
    <link rel="manifest" href="/manifest.webmanifest" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
